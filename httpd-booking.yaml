apiVersion: apps/v1
kind: Deployment
metadata:
  name: httpd-booking
spec:
  replicas: 3
  selector:
    matchLabels:
      app: httpd-booking
  template:
    metadata:
      labels:
        app: httpd-booking
    spec:
      containers:
      - name: httpd
        image: httpd:latest
        ports:
        - containerPort: 80
        volumeMounts:
        - name: booking-html-volume
          mountPath: /usr/local/apache2/htdocs
      volumes:
      - name: booking-html-volume
        configMap:
          name: booking-html
---
apiVersion: v1
kind: Service
metadata:
  name: httpd-booking-nodeport
spec:
  type: NodePort
  selector:
    app: httpd-booking
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
    nodePort: 30080
